services:
  gateway:
    image: nginx:1.27-alpine
    container_name: vitaltrack-gateway
    depends_on:
      frontend:
        condition: service_started
      ingestion:
        condition: service_started
      notification:
        condition: service_started
      prediction:
        condition: service_started
      escalation:
        condition: service_started
    ports:
      - "8000:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build: ./frontend
    container_name: vitaltrack-frontend

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: vitaltrack-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: vitaltrack-db
    environment:
      POSTGRES_USER: vitaltrack
      POSTGRES_PASSWORD: vitaltrack
      POSTGRES_DB: vitaltrack
    ports:
      - "5433:5432"
    volumes:
      - vitaltrack_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitaltrack -d vitaltrack"]
      interval: 5s
      timeout: 5s
      retries: 20

  ingestion:
    build: ./backend
    container_name: vitaltrack-ingestion
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://vitaltrack:vitaltrack@db:5432/vitaltrack
      JWT_SECRET: "vitaltrack-s3cure-jwt-secret-2026-change-this-in-prod-32plus"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_ALERT_QUEUE: vitaltrack.alerts.created
      RABBITMQ_NOTIFICATION_QUEUE: vitaltrack.notifications.events
      RABBITMQ_VITAL_QUEUE: vitaltrack.vitals.received
      RABBITMQ_ESCALATION_QUEUE: vitaltrack.escalation.events
      RABBITMQ_DLX: vitaltrack.dlx
      RABBITMQ_FORCE_DLX_REDECLARE: "true"
    command: ["uvicorn", "app.ingestion_main:app", "--host", "0.0.0.0", "--port", "8000"]

  notification:
    build: ./backend
    container_name: vitaltrack-notification
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://vitaltrack:vitaltrack@db:5432/vitaltrack
      JWT_SECRET: "vitaltrack-s3cure-jwt-secret-2026-change-this-in-prod-32plus"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_ALERT_QUEUE: vitaltrack.alerts.created
      RABBITMQ_NOTIFICATION_QUEUE: vitaltrack.notifications.events
      RABBITMQ_VITAL_QUEUE: vitaltrack.vitals.received
      RABBITMQ_ESCALATION_QUEUE: vitaltrack.escalation.events
      RABBITMQ_DLX: vitaltrack.dlx
      RABBITMQ_FORCE_DLX_REDECLARE: "true"
      OPENAI_CHATBOT_ENABLED: "true"
      OPENAI_CHATBOT_MODEL: "gpt-4.1-mini"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_CHATBOT_ENABLED: "true"
      GEMINI_CHATBOT_MODEL: "gemini-2.0-flash"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    command: ["uvicorn", "app.notification_main:app", "--host", "0.0.0.0", "--port", "8000"]

  prediction:
    build: ./backend
    container_name: vitaltrack-prediction
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://vitaltrack:vitaltrack@db:5432/vitaltrack
      JWT_SECRET: "vitaltrack-s3cure-jwt-secret-2026-change-this-in-prod-32plus"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_NOTIFICATION_QUEUE: vitaltrack.notifications.events
      RABBITMQ_VITAL_QUEUE: vitaltrack.vitals.received
      RABBITMQ_ESCALATION_QUEUE: vitaltrack.escalation.events
      RABBITMQ_DLX: vitaltrack.dlx
      RABBITMQ_FORCE_DLX_REDECLARE: "true"
    command: ["uvicorn", "app.prediction_main:app", "--host", "0.0.0.0", "--port", "8000"]

  escalation:
    build: ./backend
    container_name: vitaltrack-escalation
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://vitaltrack:vitaltrack@db:5432/vitaltrack
      JWT_SECRET: "vitaltrack-s3cure-jwt-secret-2026-change-this-in-prod-32plus"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_ESCALATION_QUEUE: vitaltrack.escalation.events
      RABBITMQ_DLX: vitaltrack.dlx
      RABBITMQ_FORCE_DLX_REDECLARE: "true"
      ESCALATION_INTERVAL_SECONDS: "27"
    command: ["uvicorn", "app.escalation_main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  vitaltrack_data:
